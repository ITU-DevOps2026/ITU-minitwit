name: Build Report

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: 'latest'
          
      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2
        
      - name: Run Makefile
        working-directory: ./report
        run: |
          mkdir -p build
          make all

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSc-Group-K-Report
          path: report/build/MSc_group_k.pdf