name: PR to main deploys to test env

on:
  pull_request:
    # Run workflow every time a pull request is opened on main
    branches:
      - main
  # allow manual triggers for now too
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image locally (only inside the CI runner)
      - name: Build Docker
        run: docker build -t minitwitimage:pr -f Dockerfile-minitwit .

      # Run Dockle scan
      - name: Run Dockle
        uses: goodwithtech/dockle-action@e30e6af832aad6ea7dca2a248d31a85eab6dbd68
        with:
          image: minitwitimage:pr
          exit-code: '1'
          exit-level: 'warn'

      - name: Build and push minitwit-dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile-minitwit
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwit-dev:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-dev:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwit-dev:webbuildcache,mode=max

  deploy:
    needs: [tests, build-push]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
      
      - name: Copy configuration files to Droplet
        run: |
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./remote_files/test_env/* $SSH_USER_TEST_ENV@$SSH_HOST_TEST_ENV:/minitwit/
        env: 
          SSH_USER_TEST_ENV: ${{ secrets.SSH_USER_TEST_ENV }}
          SSH_HOST_TEST_ENV: ${{ secrets.SSH_HOST_TEST_ENV }}

      - name: Deploy to server
        run: >
          ssh $SSH_USER_TEST_ENV@$SSH_HOST_TEST_ENV
          -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no
          '/minitwit/deploy.sh'
        env:
          SSH_USER_TEST_ENV: ${{ secrets.SSH_USER_TEST_ENV }}
          SSH_HOST_TEST_ENV: ${{ secrets.SSH_HOST_TEST_ENV }}