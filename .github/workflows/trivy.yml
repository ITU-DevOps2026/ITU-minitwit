
name: Trivy Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'  # weekly scan on mondays at 3:00 AM UTC

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget --max-redirect=0 --https-only \
            https://aquasecurity.github.io/trivy-repo/deb/public.key \
            -O trivy.key

          gpg --dearmor trivy.key
          sudo mv trivy.key.gpg /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Dockerfiles
        run: |
          CONFIG_FAIL=0

          trivy config . \
            --file-patterns "dockerfile:Dockerfile*" \
            --severity HIGH,CRITICAL \
            --exit-code 1 || CONFIG_FAIL=1

          echo "CONFIG_FAIL=$CONFIG_FAIL" >> $GITHUB_ENV

      
      - name: Build and scan all Docker images
        run: |
          shopt -s nullglob

          IMAGE_FAIL=0

          # Root Dockerfiles
          for file in Dockerfile-*; do 
            echo "Found root file $file"

            name=$(echo "$file" | sed 's/Dockerfile-//')
            image="minitwit-$name"

            echo "Building $file → $image"
            docker build -f "$file" -t "$image:latest" .

            echo "Scanning $image"
            trivy image "$image:latest" \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --no-progress || IMAGE_FAIL=1
          done

          # Subfolder Dockerfiles
          for file in */Dockerfile; do
            echo "Found nested file $file"

            dir=$(dirname "$file")
            name=$(basename "$dir")
            image="minitwit-$name"

            echo "Building $file → $image"
            docker build -f "$file" -t "$image:latest" "$dir"

            echo "Scanning $image"
            trivy image "$image:latest" \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --no-progress || IMAGE_FAIL=1
          done

          echo "IMAGE_FAIL=$IMAGE_FAIL" >> $GITHUB_ENV

      - name: Final security gate
        run: |
          echo "Config scan result: $CONFIG_FAIL"
          echo "Image scan result: $IMAGE_FAIL"

          if [ "$CONFIG_FAIL" -eq 1 ] || [ "$IMAGE_FAIL" -eq 1 ]; then
            echo "❌ Security issues detected"
            exit 1
          else
            echo "✅ All security checks passed"
          fi
