name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5.2.0
        with:
          dotnet-version: '10.0.x'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/scanner"
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/scanner"
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" begin /k:"ITU-DevOps2026_ITU-minitwit" \
            /o:"itu-devops2026-patmyaz" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.c.file.suffixes=- \
            /d:sonar.cpp.file.suffixes=- \
            /d:sonar.objc.file.suffixes=- \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/wwwroot/lib/**" \
            /d:sonar.coverage.exclusions="**/*"

          dotnet restore minitwit/minitwit.sln
          dotnet build minitwit/minitwit.sln --no-restore
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" end /d:sonar.token="$SONAR_TOKEN"