name: Tests

on: 
  workflow_call:
  pull_request:
    branches-ignore: 
      - main

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Run dotnet tests
        run: docker compose up --build --exit-code-from tests tests
  
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Run API tests
        run: docker compose up --build --exit-code-from apitests apitests
  
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Run UI/End-to-End tests
        run: docker compose up --build --exit-code-from uitests uitests
    