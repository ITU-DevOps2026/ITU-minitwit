services:
  minitwit-dev:
    image: ${DOCKER_USERNAME}/minitwit-dev
    container_name: minitwit_container
    ports:
      - 5035:8080
    volumes:
      - ../data:/app/data
    environment:
      - DbPath=${db_connection}

  prometheus:
    build: 
      dockerfile: ./Dockerfile
      context: ./monitoring/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - main

  grafana:
    build: 
      dockerfile: ./Dockerfile
      context: ./monitoring/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - main
