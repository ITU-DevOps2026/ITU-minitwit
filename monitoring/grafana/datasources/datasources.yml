apiVersion: 1

# Inspired by https://community.grafana.com/t/solved-datasource-provisioning-prometheus/6300
datasources:
  - name: prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: elasticsearch
    type: elasticsearch
    url: http://elasticsearch:9200
    access: proxy
    jsonData:
      esVersion: 7
      timeField: "@timestamp"
    isDefault: false
    editable: false