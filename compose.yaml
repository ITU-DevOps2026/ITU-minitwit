# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose

networks:
  main:
    name: itu-minitwit-network

services:
  minitwit:
    restart: on-failure
    build:
      context: .
      dockerfile: Dockerfile-minitwit
      target: final
    networks:
      - main
    ports:
      - 5035:8080
    depends_on:
      itusqlimage:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - DbPath=Server=itusqlimage;Port=3306;Database=minitwit;Uid=root;Pwd=root;SslMode=None;AllowPublicKeyRetrieval=True;
    
  itusqlimage:
    build:
      context: .
      dockerfile: Dockerfile-mysql
    networks:
      - main
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s # We give it enough time to start up so that minitwit doesn't connect to a non-existent database
  
  tests:
    build:
      context: .
      dockerfile: Dockerfile-minitwit-tests
    networks:
      - main
    depends_on:
      - minitwit
    environment:
      - BaseUrl=http://minitwit:8080

  apitests:
    build:
      context: .
      dockerfile: Dockerfile-minitwit-api-tests
    networks:
      - main
    depends_on:
      - minitwit
    environment:
      - BaseUrl=http://minitwit:8080/api
